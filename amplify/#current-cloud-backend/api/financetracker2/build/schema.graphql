type Transaction {
  id: ID!
  description: String!
  amount: Float!
  type: TransactionType!
  category: String!
  date: AWSDateTime!
  receiptUrl: String
  owner: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

enum TransactionType {
  INCOME
  EXPENSE
}

type Budget {
  id: ID!
  category: String!
  limit: Float!
  month: String!
  owner: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type FinancialSummary {
  id: ID!
  totalIncome: Float!
  totalExpenses: Float!
  balance: Float!
  month: String!
  owner: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type CalculatedSummary {
  totalIncome: Float!
  totalExpenses: Float!
  balance: Float!
  savingsRate: Float!
}

type NotificationResult {
  success: Boolean!
  message: String!
}

type TransactionConnection {
  items: [Transaction]
  nextToken: String
}

type Query {
  calculateFinancialSummary: CalculatedSummary
  getTransactionsByCategory(category: String!, limit: Int): TransactionConnection
  getTransaction(id: ID!): Transaction
  listTransactions(filter: ModelTransactionFilterInput, limit: Int, nextToken: String): ModelTransactionConnection
  getBudget(id: ID!): Budget
  listBudgets(filter: ModelBudgetFilterInput, limit: Int, nextToken: String): ModelBudgetConnection
  getFinancialSummary(id: ID!): FinancialSummary
  listFinancialSummaries(filter: ModelFinancialSummaryFilterInput, limit: Int, nextToken: String): ModelFinancialSummaryConnection
}

type Mutation {
  sendMonthlyReport(email: String!): NotificationResult
  sendBudgetAlert(email: String!, category: String!, exceeded: Float!): NotificationResult
  createTransaction(input: CreateTransactionInput!, condition: ModelTransactionConditionInput): Transaction
  updateTransaction(input: UpdateTransactionInput!, condition: ModelTransactionConditionInput): Transaction
  deleteTransaction(input: DeleteTransactionInput!, condition: ModelTransactionConditionInput): Transaction
  createBudget(input: CreateBudgetInput!, condition: ModelBudgetConditionInput): Budget
  updateBudget(input: UpdateBudgetInput!, condition: ModelBudgetConditionInput): Budget
  deleteBudget(input: DeleteBudgetInput!, condition: ModelBudgetConditionInput): Budget
  createFinancialSummary(input: CreateFinancialSummaryInput!, condition: ModelFinancialSummaryConditionInput): FinancialSummary
  updateFinancialSummary(input: UpdateFinancialSummaryInput!, condition: ModelFinancialSummaryConditionInput): FinancialSummary
  deleteFinancialSummary(input: DeleteFinancialSummaryInput!, condition: ModelFinancialSummaryConditionInput): FinancialSummary
}

input ModelStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelFloatInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelBooleanInput {
  ne: Boolean
  eq: Boolean
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelIDInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelSubscriptionStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  in: [String]
  notIn: [String]
}

input ModelSubscriptionIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  in: [Int]
  notIn: [Int]
}

input ModelSubscriptionFloatInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  in: [Float]
  notIn: [Float]
}

input ModelSubscriptionBooleanInput {
  ne: Boolean
  eq: Boolean
}

input ModelSubscriptionIDInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  in: [ID]
  notIn: [ID]
}

enum ModelAttributeTypes {
  binary
  binarySet
  bool
  list
  map
  number
  numberSet
  string
  stringSet
  _null
}

input ModelSizeInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
}

enum ModelSortDirection {
  ASC
  DESC
}

type ModelTransactionConnection {
  items: [Transaction]!
  nextToken: String
}

input ModelTransactionTypeInput {
  eq: TransactionType
  ne: TransactionType
}

input ModelTransactionFilterInput {
  id: ModelIDInput
  description: ModelStringInput
  amount: ModelFloatInput
  type: ModelTransactionTypeInput
  category: ModelStringInput
  date: ModelStringInput
  receiptUrl: ModelStringInput
  owner: ModelStringInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelTransactionFilterInput]
  or: [ModelTransactionFilterInput]
  not: ModelTransactionFilterInput
}

input ModelTransactionConditionInput {
  description: ModelStringInput
  amount: ModelFloatInput
  type: ModelTransactionTypeInput
  category: ModelStringInput
  date: ModelStringInput
  receiptUrl: ModelStringInput
  owner: ModelStringInput
  and: [ModelTransactionConditionInput]
  or: [ModelTransactionConditionInput]
  not: ModelTransactionConditionInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
}

input CreateTransactionInput {
  id: ID
  description: String!
  amount: Float!
  type: TransactionType!
  category: String!
  date: AWSDateTime!
  receiptUrl: String
  owner: String
}

input UpdateTransactionInput {
  id: ID!
  description: String
  amount: Float
  type: TransactionType
  category: String
  date: AWSDateTime
  receiptUrl: String
  owner: String
}

input DeleteTransactionInput {
  id: ID!
}

input ModelSubscriptionTransactionFilterInput {
  id: ModelSubscriptionIDInput
  description: ModelSubscriptionStringInput
  amount: ModelSubscriptionFloatInput
  type: ModelSubscriptionStringInput
  category: ModelSubscriptionStringInput
  date: ModelSubscriptionStringInput
  receiptUrl: ModelSubscriptionStringInput
  owner: ModelSubscriptionStringInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionTransactionFilterInput]
  or: [ModelSubscriptionTransactionFilterInput]
}

type Subscription {
  onCreateTransaction(filter: ModelSubscriptionTransactionFilterInput): Transaction @aws_subscribe(mutations: ["createTransaction"])
  onUpdateTransaction(filter: ModelSubscriptionTransactionFilterInput): Transaction @aws_subscribe(mutations: ["updateTransaction"])
  onDeleteTransaction(filter: ModelSubscriptionTransactionFilterInput): Transaction @aws_subscribe(mutations: ["deleteTransaction"])
  onCreateBudget(filter: ModelSubscriptionBudgetFilterInput): Budget @aws_subscribe(mutations: ["createBudget"])
  onUpdateBudget(filter: ModelSubscriptionBudgetFilterInput): Budget @aws_subscribe(mutations: ["updateBudget"])
  onDeleteBudget(filter: ModelSubscriptionBudgetFilterInput): Budget @aws_subscribe(mutations: ["deleteBudget"])
  onCreateFinancialSummary(filter: ModelSubscriptionFinancialSummaryFilterInput): FinancialSummary @aws_subscribe(mutations: ["createFinancialSummary"])
  onUpdateFinancialSummary(filter: ModelSubscriptionFinancialSummaryFilterInput): FinancialSummary @aws_subscribe(mutations: ["updateFinancialSummary"])
  onDeleteFinancialSummary(filter: ModelSubscriptionFinancialSummaryFilterInput): FinancialSummary @aws_subscribe(mutations: ["deleteFinancialSummary"])
}

type ModelBudgetConnection {
  items: [Budget]!
  nextToken: String
}

input ModelBudgetFilterInput {
  id: ModelIDInput
  category: ModelStringInput
  limit: ModelFloatInput
  month: ModelStringInput
  owner: ModelStringInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelBudgetFilterInput]
  or: [ModelBudgetFilterInput]
  not: ModelBudgetFilterInput
}

input ModelBudgetConditionInput {
  category: ModelStringInput
  limit: ModelFloatInput
  month: ModelStringInput
  owner: ModelStringInput
  and: [ModelBudgetConditionInput]
  or: [ModelBudgetConditionInput]
  not: ModelBudgetConditionInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
}

input CreateBudgetInput {
  id: ID
  category: String!
  limit: Float!
  month: String!
  owner: String
}

input UpdateBudgetInput {
  id: ID!
  category: String
  limit: Float
  month: String
  owner: String
}

input DeleteBudgetInput {
  id: ID!
}

input ModelSubscriptionBudgetFilterInput {
  id: ModelSubscriptionIDInput
  category: ModelSubscriptionStringInput
  limit: ModelSubscriptionFloatInput
  month: ModelSubscriptionStringInput
  owner: ModelSubscriptionStringInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionBudgetFilterInput]
  or: [ModelSubscriptionBudgetFilterInput]
}

type ModelFinancialSummaryConnection {
