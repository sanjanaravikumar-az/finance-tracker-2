  totalIncome: ModelFloatInput
  totalExpenses: ModelFloatInput
  balance: ModelFloatInput
  month: ModelStringInput
  owner: ModelStringInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelFinancialSummaryFilterInput]
  or: [ModelFinancialSummaryFilterInput]
  not: ModelFinancialSummaryFilterInput
}

input ModelFinancialSummaryConditionInput {
  totalIncome: ModelFloatInput
  totalExpenses: ModelFloatInput
  balance: ModelFloatInput
  month: ModelStringInput
  owner: ModelStringInput
  and: [ModelFinancialSummaryConditionInput]
  or: [ModelFinancialSummaryConditionInput]
  not: ModelFinancialSummaryConditionInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
}

input CreateFinancialSummaryInput {
  id: ID
  totalIncome: Float!
  totalExpenses: Float!
  balance: Float!
  month: String!
  owner: String
}

input UpdateFinancialSummaryInput {
  id: ID!
  totalIncome: Float
  totalExpenses: Float
  balance: Float
  month: String
  owner: String
}

input DeleteFinancialSummaryInput {
  id: ID!
}

input ModelSubscriptionFinancialSummaryFilterInput {
  id: ModelSubscriptionIDInput
  totalIncome: ModelSubscriptionFloatInput
  totalExpenses: ModelSubscriptionFloatInput
  balance: ModelSubscriptionFloatInput
  month: ModelSubscriptionStringInput
  owner: ModelSubscriptionStringInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionFinancialSummaryFilterInput]
